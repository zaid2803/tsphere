name: TaskSphere CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  compile-and-validate:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the latest code from the repository change trigger
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up virtual Docker environment builders
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Ensure Docker Compose toolsets are active on the runner instance
      - name: Build Docker Container Stack
        run: docker-compose build

      # 4. Run Django's internal system integrity diagnostics check
      - name: Backend System Integrity Check
        run: docker-compose run --rm backend python manage.py check
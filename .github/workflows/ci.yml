name: TaskSphere Professional CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  academic-validation:
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch code repository
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 2. Code Quality Check (Linting)
      # This proves your Python code adheres to PEP 8 standards
      - name: Set up Python for Linting
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Static Code Analysis (Flake8)
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 3. Virtualization Environment Build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Compile the full multi-container stack
      - name: Compile Docker Containers
        run: docker compose build

      # 5. Execute Backend Django Unit Tests
      - name: Execute Backend Automated Tests
        run: docker compose run --rm backend python manage.py test
        # 6. Execute Frontend React Unit Tests
      - name: Execute Frontend Automated Tests
        run: docker compose run --rm frontend npm test -- --watchAll=false --passWithNoTests
        